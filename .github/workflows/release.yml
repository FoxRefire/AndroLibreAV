# Build and release AndroLibreAV APK to GitHub Releases
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   SIGNING_KEY       - Base64-encoded keystore (openssl base64 -in release.jks | tr -d '\n')
#   ALIAS             - Key alias name
#   KEY_STORE_PASSWORD - Keystore password
#   KEY_PASSWORD      - Key password (can be same as keystore password)
#
# Usage: Create a keystore, add secrets, then push a tag: git tag v1.0 && git push origin v1.0

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure Gradle for CI (reduce OOM risk)
        run: |
          echo "org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> gradle.properties
          echo "org.gradle.workers.max=1" >> gradle.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Set build-tools version for signing
        id: buildtools
        run: |
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          BT_DIR="$SDK_ROOT/build-tools"
          if [[ -d "$BT_DIR" ]]; then
            VERSION=$(ls "$BT_DIR" | sort -V | tail -1)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "BUILD_TOOLS_VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "version=34.0.0" >> $GITHUB_OUTPUT
            echo "BUILD_TOOLS_VERSION=34.0.0" >> $GITHUB_ENV
          fi

      - name: Sign APK
        id: sign
        uses: r0adkll/sign-android-release@v1
        env:
          BUILD_TOOLS_VERSION: ${{ steps.buildtools.outputs.version }}
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Get tag name
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "tag=build-${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign.outputs.signedReleaseFile }}
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact (manual run)
        if: steps.tag.outputs.is_release == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.tag.outputs.tag }}
          path: ${{ steps.sign.outputs.signedReleaseFile }}
